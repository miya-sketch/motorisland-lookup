<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貳輪嶼 區域門市查詢</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f5;--card:#fff;--border:#e8e8e8;--text:#111;--sub:#888;
  --input-bg:#fff;--input-border:#ddd;--input-focus:#555;
  --header:#111;--header-text:#fff;--header-sub:#aaa;
  --multi-hover:#f0f0f0;--btn-share:#111;--btn-share-text:#fff;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1a1a1a;--card:#2a2a2a;--border:#3a3a3a;--text:#f0f0f0;--sub:#999;
    --input-bg:#2a2a2a;--input-border:#444;--input-focus:#aaa;
    --header:#000;--header-text:#fff;--header-sub:#888;
    --multi-hover:#333;--btn-share:#f0f0f0;--btn-share-text:#111;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif;background:var(--bg);min-height:100vh;padding:0 0 60px;color:var(--text)}
header{background:var(--header);color:var(--header-text);padding:14px 20px 10px;text-align:center}
header h1{font-size:16px;font-weight:600;letter-spacing:1px}
.quote-bar{background:#d9ff00;padding:8px 16px;text-align:center;font-size:12px;font-weight:500;color:#111;letter-spacing:0.3px}
.container{max-width:520px;margin:0 auto;padding:16px 16px 0}
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap svg.ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:var(--sub);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
input#q{width:100%;padding:13px 13px 13px 44px;font-size:16px;border:1.5px solid var(--input-border);border-radius:14px;background:var(--input-bg);color:var(--text);outline:none;-webkit-appearance:none;transition:border-color 0.15s}
input#q:focus{border-color:var(--input-focus)}
input#q::placeholder{color:var(--sub)}

/* result */
#result{display:none}
.back-btn{display:flex;align-items:center;gap:5px;background:none;border:none;color:var(--sub);font-size:13px;cursor:pointer;padding:0;margin-bottom:10px;-webkit-tap-highlight-color:transparent}
.back-btn svg{width:15px;height:15px;stroke:var(--sub);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.card{background:var(--card);border-radius:14px;padding:14px 16px;margin-bottom:10px;border:1px solid var(--border)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.card .city{font-size:11px;color:var(--sub);margin-bottom:2px}
.card .district{font-size:19px;font-weight:700;color:var(--text);margin-bottom:8px}
.store-badge{display:inline-block;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px}
.weather-box{text-align:right;flex-shrink:0;margin-left:8px}
.weather-box .temp{font-size:17px;font-weight:700;color:var(--text)}
.weather-box .wdesc{font-size:11px;color:var(--sub);margin-top:1px}

/* info card */
.info-card{background:var(--card);border-radius:14px;border:1px solid var(--border);margin-bottom:10px;overflow:hidden}
.info-toggle{width:100%;background:none;border:none;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;color:var(--text);font-size:13px;font-weight:500;-webkit-tap-highlight-color:transparent}
.info-toggle svg{width:16px;height:16px;stroke:var(--sub);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:transform 0.2s;flex-shrink:0}
.info-toggle.open svg{transform:rotate(180deg)}
.info-body{display:none;padding:0 16px 14px;border-top:1px solid var(--border)}
.info-body.show{display:block}
.info-row{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.info-row:last-of-type{border-bottom:none}
.info-label{font-size:11px;font-weight:600;color:#d9ff00;background:#111;padding:2px 7px;border-radius:8px;white-space:nowrap;margin-top:1px;flex-shrink:0}
.info-val{font-size:13px;color:var(--text);line-height:1.5}
.share-btn{width:100%;margin-top:10px;padding:11px;font-size:13px;font-weight:600;border-radius:10px;border:none;background:var(--btn-share);color:var(--btn-share-text);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity 0.15s}
.share-btn:active{opacity:0.7}
.share-btn.copied{background:#16a34a!important;color:#fff!important}

.copy-label{font-size:12px;color:var(--sub);margin-bottom:8px}
.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.copy-btn{padding:15px 10px;font-size:15px;font-weight:700;border-radius:14px;border:2px solid;cursor:pointer;text-align:center;transition:opacity 0.15s,transform 0.1s;-webkit-tap-highlight-color:transparent;line-height:1.4}
.copy-btn:active{transform:scale(0.96);opacity:0.75}
.copy-btn.copied{background:#dcfce7!important;color:#166534!important;border-color:#16a34a!important}

/* multi */
#multi{display:none}
.multi-hint{font-size:13px;color:var(--sub);margin-bottom:8px}
.multi-item{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.multi-item:active{background:var(--multi-hover)}
.multi-item .name{font-size:15px;color:var(--text)}
.multi-item .name span{font-weight:600}
.mini-badge{font-size:12px;padding:3px 10px;border-radius:12px;border:1px solid;white-space:nowrap;margin-left:8px;flex-shrink:0}

/* no result */
#noresult{display:none;text-align:center;padding:36px 20px}
#noresult .emoji{font-size:38px;margin-bottom:10px}
#noresult p{font-size:14px;color:var(--sub);line-height:1.8}
.report-btn{margin-top:14px;padding:12px 24px;font-size:14px;font-weight:600;border-radius:12px;border:1.5px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;-webkit-tap-highlight-color:transparent}
.report-btn:active{opacity:0.7}

footer{text-align:center;font-size:11px;color:var(--sub);padding:28px 0 0;opacity:0.6}
/* autocomplete */
.autocomplete-wrap{position:relative}
.dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:0 4px 16px rgba(0,0,0,0.1);z-index:100;overflow:hidden;display:none;max-height:280px;overflow-y:auto}
.dropdown.show{display:block}
.dropdown-item{padding:12px 16px;font-size:15px;color:var(--text);cursor:pointer;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;-webkit-tap-highlight-color:transparent}
.dropdown-item:last-child{border-bottom:none}
.dropdown-item:active{background:var(--multi-hover)}
.dropdown-item .d-area{font-weight:500}
.dropdown-item .d-store{font-size:12px;padding:2px 8px;border-radius:10px;border:1px solid;white-space:nowrap;margin-left:8px;flex-shrink:0}
</style>

<body>
<header>
  <h1>貳輪嶼 MOTOR ISLAND｜全台門市查詢</h1>
</header>
<div class="quote-bar" id="quote-bar">載入今日金句中…</div>

<div class="container">
  <div class="search-wrap autocomplete-wrap">

  </div>

  <div id="result">

    <div class="info-card" id="info-card">

        <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>

    </div>

    <div class="copy-label">點擊複製，貼到 LINE 使用</div>
    <div class="btn-grid" id="btn-grid"></div>
  </div>

  <div id="multi">
    <div class="multi-hint" id="multi-hint"></div>
    <div id="multi-list"></div>
  </div>

  <div id="noresult">

const weatherCache={};

async function fetchWeatherByCoords(lat, lng, cacheKey){
  if(weatherCache[cacheKey]) return weatherCache[cacheKey];
  try{
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,weathercode&timezone=Asia%2FTaipei`;
    const r=await fetch(url);
    const j=await r.json();
    const temp=Math.round(j.current.temperature_2m);
    const wc=j.current.weathercode;
    let desc,icon;
    if(wc===0){desc='晴天';icon='☀️';}
    else if(wc<=3){desc='多雲';icon='⛅';}
    else if(wc<=48){desc='陰天';icon='☁️';}
    else if(wc<=67){desc='下雨';icon='🌧️';}
    else if(wc<=77){desc='下雪';icon='❄️';}
    else{desc='雷雨';icon='⛈️';}
    const res={temp,desc,icon};
    weatherCache[cacheKey]=res; return res;
  }catch(e){return null;}
}

async function fetchWeather(code){
  const c=storeCoords[code]; if(!c) return null;
  return fetchWeatherByCoords(c.lat, c.lng, code);
}

async function fetchDistrictWeather(city, district){
  // 優先用「縣市+區名」避免重名，再用「區名」
  const c=districtCoords[city+district]||districtCoords[city+'市'+district]||districtCoords[district];
  if(!c) return null;
  return fetchWeatherByCoords(c.lat, c.lng, city+district);
}

function copy(text,btn){
  navigator.clipboard.writeText(text).then(()=>{
    btn.classList.add('copied');
    const orig=btn.textContent;
    btn.textContent='✓ 已複製！';
    setTimeout(()=>{btn.classList.remove('copied');btn.textContent=orig;},1500);
  });
}

function toggleInfo(){
  const body=document.getElementById('info-body');
  const toggle=document.getElementById('info-toggle');
  const show=body.classList.toggle('show');
  toggle.classList.toggle('open',show);

function shareInfo(){
  if(!currentItem) return;
  const info=storeInfo[currentItem.code];
  if(!info) return;
  const transport=info.transport.split('\n').join('\n');
  const text=`【貳輪嶼 MOTOR ISLAND｜${info.name}】\n📍 地址：${info.addr}\n📞 電話：${info.tel}\n🕐 營業時間：${info.hours}\n🚌 交通：\n${transport}`;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById('share-btn');
    btn.classList.add('copied');
    btn.textContent='✓ 已複製！可貼給客人';
    setTimeout(()=>{btn.classList.remove('copied');btn.textContent='📋 複製門市資訊給客人';},2000);
  });
}

function renderInfoCard(code){
  const info=storeInfo[code];
  const el=document.getElementById('info-content');
  if(!info){el.innerHTML='<p style="color:var(--sub);font-size:13px;padding:8px 0">此門市暫無詳細資訊</p>';return;}
  const rows=[
    {label:'地址',val:info.addr},
    {label:'電話',val:`<a href="tel:${info.tel}" style="color:inherit">${info.tel}</a>`},
    {label:'營業',val:info.hours},
    {label:'交通',val:info.transport.split('\n').join('<br>')},
  ];
  el.innerHTML=rows.map(r=>`<div class="info-row"><span class="info-label">${r.label}</span><span class="info-val">${r.val}</span></div>`).join('');
  // reset toggle state
  document.getElementById('info-body').classList.remove('show');
  document.getElementById('info-toggle').classList.remove('open');
}

async function showOne(item){
  currentItem=item;
  const c=col(item.code);
  document.getElementById('res-city').textContent=item.city;
  document.getElementById('res-district').textContent=item.district;
  const sb=document.getElementById('res-store');
  sb.textContent=item.store;
  sb.style.cssText=`display:inline-block;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;background:${c.bg};color:${c.tx};border:1px solid ${c.bd};`;
  renderInfoCard(item.code);
  const grid=document.getElementById('btn-grid');
  grid.innerHTML='';
  templates.forEach(t=>{
    const text=`待回覆🔺${item.code}${t}`;
    const btn=document.createElement('button');
    btn.className='copy-btn';
    btn.textContent=text;
    btn.style.cssText=`background:${c.bg};color:${c.tx};border-color:${c.bd};`;
    btn.onclick=()=>copy(text,btn);
    grid.appendChild(btn);
  });
  document.getElementById('result').style.display='block';
  document.getElementById('multi').style.display='none';
  document.getElementById('noresult').style.display='none';
  // 客人所在地天氣
  const dw=document.getElementById('district-weather');
  const sw=document.getElementById('store-weather');
  dw.innerHTML='<div style="font-size:10px;color:var(--sub)">所在地載入中…</div>';
  sw.innerHTML='<div style="font-size:10px;color:var(--sub)">門市載入中…</div>';

  // 非同步同時查兩個天氣
  fetchDistrictWeather(item.city, item.district).then(w=>{
    if(w) dw.innerHTML=`<div style="font-size:10px;color:var(--sub);margin-bottom:1px">📍 ${item.district}</div><div class="temp">${w.icon} ${w.temp}°C</div><div class="wdesc">${w.desc}</div>`;
    else dw.innerHTML='';
  });
  fetchWeather(item.code).then(w=>{
    if(w) sw.innerHTML=`<div style="font-size:10px;color:var(--sub);margin-bottom:1px">🏪 ${item.store}</div><div class="temp">${w.icon} ${w.temp}°C</div><div class="wdesc">${w.desc}</div>`;
    else sw.innerHTML='';
  });
}

function showMulti(items){
  document.getElementById('multi-hint').textContent=`找到 ${items.length} 個地區，請選擇：`;
  const list=document.getElementById('multi-list');
  list.innerHTML='';
  items.slice(0,10).forEach(item=>{
    const c=col(item.code);
    const div=document.createElement('div');
    div.className='multi-item';
    div.innerHTML=`<span class="name">${item.city} <span>${item.district}</span></span><span class="mini-badge" style="background:${c.bg};color:${c.tx};border-color:${c.bd};">${item.store}</span>`;
    div.onclick=()=>{document.getElementById('q').value=item.area;showOne(item);};
    list.appendChild(div);
  });
  document.getElementById('multi').style.display='block';
  document.getElementById('result').style.display='none';
  document.getElementById('noresult').style.display='none';
}

function goBack(){
  document.getElementById('result').style.display='none';
  document.getElementById('multi').style.display='none';
  document.getElementById('noresult').style.display='none';
  const q=document.getElementById('q');
  q.value=''; q.focus();
}

function handleSearch(){
  const q=document.getElementById('q').value.trim();
  if(!q){
    document.getElementById('result').style.display='none';
    document.getElementById('multi').style.display='none';
    document.getElementById('noresult').style.display='none';
    return;
  }
  const aliasQ = aliases[q];
  let f;
  if(aliasQ){
    // alias 直接對應單一地區
    f=data.filter(d=>d.area.includes(aliasQ)||d.district.includes(aliasQ)||d.city.includes(aliasQ));
  } else {
    // 一般搜尋：收集所有符合的結果
    const results=new Map();
    data.filter(d=>
      d.district===q||
      d.district.startsWith(q)||
      d.area.includes(q)||
      d.city.includes(q)
    ).forEach(d=>results.set(d.area,d));
    // 補「區」字精準匹配
    const withSuffix=q+'區';
    data.filter(d=>d.district===withSuffix).forEach(d=>results.set(d.area,d));
    f=[...results.values()];
  }
  if(!f.length){
    document.getElementById('noresult').style.display='block';
    document.getElementById('result').style.display='none';
    document.getElementById('multi').style.display='none';
  } else if(f.length===1){
    // 只有一筆才直接顯示
    showOne(f[0]);
  } else {
    // 多筆一律顯示選單，不自動挑選
    showMulti(f);
  }
}

function reportMissing(){
  const q=document.getElementById('q').value.trim();
  const subject=encodeURIComponent(`【區域回報】${q} 尚未收錄`);
  const body=encodeURIComponent(`MIYA 你好，\n\n以下地區在查詢工具中找不到，麻煩協助新增：\n\n地區名稱：${q}\n\n感謝！`);
  window.location.href=`mailto:miya@2motor.tw?subject=${subject}&body=${body}`;
}
